name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: Rust ${{ matrix.toolchain }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain: [stable]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --all
      - name: cargo doc
        run: cargo doc --no-deps --all

  schemas:
    name: JSON Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate JSON Schema files
        run: |
          npx --yes ajv-cli@5 compile -s spec/v1.0/schemas/persona-draft.schema.json --spec=draft2020 --validate-formats=false
          npx --yes ajv-cli@5 compile -s spec/v1.0/schemas/persona-manifest.schema.json -r spec/v1.0/schemas/persona-draft.schema.json --spec=draft2020 --validate-formats=false
      - name: Validate every bundled sample against its schema
        run: |
          for d in samples/persona-*; do
            npx --yes ajv-cli@5 validate -s spec/v1.0/schemas/persona-draft.schema.json -d "$d/draft.json" --spec=draft2020 --validate-formats=false
            npx --yes ajv-cli@5 validate -s spec/v1.0/schemas/persona-manifest.schema.json -r spec/v1.0/schemas/persona-draft.schema.json -d "$d/manifest.json" --spec=draft2020 --validate-formats=false
          done

  markdown:
    name: Spec markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: yes
          folder-path: 'spec'
