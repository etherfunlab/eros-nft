name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-crate:
    # GATED: crates.io publish disabled until we explicitly opt in.
    # Re-enable by changing this `if` to `if: true` (or removing it) once the
    # CRATES_IO_TOKEN secret is set on the repo and we're ready to release.
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo publish (eros-nft)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish -p eros-nft

  github-release:
    # `needs` is removed so this runs even when publish-crate is skipped.
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes
